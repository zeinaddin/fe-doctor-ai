<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0fdfa"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGradient)"/>

  <!-- Heart with pulse line -->
  <g transform="translate(256, 240)">
    <!-- Heart shape -->
    <path d="M0 50 C-30 -10 -100 -20 -100 50 C-100 120 0 170 0 170 C0 170 100 120 100 50 C100 -20 30 -10 0 50"
          fill="url(#heartGradient)"
          transform="translate(0, -20) scale(1.1)"/>

    <!-- Pulse line -->
    <path d="M-120 45 L-50 45 L-30 0 L-10 80 L10 20 L30 45 L120 45"
          fill="none"
          stroke="#0D9488"
          stroke-width="10"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- AI sparkle dots -->
  <circle cx="380" cy="100" r="12" fill="rgba(255,255,255,0.9)"/>
  <circle cx="410" cy="140" r="8" fill="rgba(255,255,255,0.7)"/>
  <circle cx="420" cy="90" r="6" fill="rgba(255,255,255,0.5)"/>
</svg>
